<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Antagonist Cloud</title>
  <style>
    :root {
      --bg: #040604;
      --bg-soft: #07110a;
      --panel: rgba(8, 12, 10, 0.58);
      --panel-strong: rgba(8, 12, 10, 0.86);
      --border: rgba(165, 207, 170, 0.18);
      --text: #eef7f0;
      --muted: rgba(238, 247, 240, 0.62);
      --accent: #a5cfaa;
      --accent-2: #3dc3cf;
      --success: #73e2a7;
      --danger: #ff7b9a;
      --shadow: 0 18px 55px rgba(0, 0, 0, 0.45);
      --radius: 16px;
      --ring: rgba(165, 207, 170, 0.18);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(1200px 700px at 75% -10%, rgba(165, 207, 170, 0.18), transparent 56%),
        radial-gradient(950px 580px at -10% 5%, rgba(61, 195, 207, 0.12), transparent 62%),
        linear-gradient(180deg, #040605 0%, #030503 45%, #020403 100%);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      line-height: 1.45;
    }
    a { color: inherit; text-decoration: none; }
    ::selection { background: rgba(165, 207, 170, 0.28); }

    #webgl {
      width: 100%;
      height: 100svh;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      pointer-events: none;
    }
    #webgl canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 1120px;
      margin: 0 auto;
      padding: 30px 18px 54px;
    }
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 20px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 650;
      letter-spacing: 0.01em;
    }
    .brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 18px rgba(165, 207, 170, 0.55);
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 34px;
      padding: 0 12px;
      border: 1px solid rgba(165, 207, 170, 0.20);
      border-radius: 999px;
      background: rgba(8, 12, 10, 0.55);
      backdrop-filter: blur(10px);
      color: rgba(238, 247, 240, 0.78);
      font-size: 12px;
      letter-spacing: 0.02em;
    }
    .pill-dot {
      width: 8px;
      height: 8px;
      border-radius: 99px;
      background: rgba(165, 207, 170, 0.95);
      box-shadow: 0 0 18px rgba(165, 207, 170, 0.30);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 42px;
      padding: 0 16px;
      border-radius: 12px;
      border: 1px solid rgba(165, 207, 170, 0.22);
      background: rgba(8, 12, 10, 0.55);
      backdrop-filter: blur(10px);
      color: rgba(238, 247, 240, 0.92);
      font-size: 13px;
      font-weight: 650;
      letter-spacing: 0.01em;
      transition: transform 0.10s ease, border-color 0.15s ease, filter 0.15s ease;
    }
    .btn:hover { border-color: rgba(165, 207, 170, 0.42); filter: brightness(1.06); }
    .btn:active { transform: translateY(1px); }
    .btn.primary {
      border-color: rgba(165, 207, 170, 0.65);
      background: linear-gradient(180deg, rgba(95, 170, 112, 0.58), rgba(30, 88, 56, 0.66));
      box-shadow: 0 16px 55px rgba(165, 207, 170, 0.16);
    }
    .btn.ghost {
      border-color: rgba(165, 207, 170, 0.16);
      color: rgba(238, 247, 240, 0.78);
      background: rgba(8, 12, 10, 0.35);
    }
    .hero {
      border: 1px solid var(--border);
      border-radius: 26px;
      background:
        radial-gradient(900px 460px at 30% -30%, rgba(165, 207, 170, 0.18), transparent 60%),
        radial-gradient(900px 460px at 110% 0%, rgba(61, 195, 207, 0.12), transparent 55%),
        linear-gradient(180deg, rgba(10, 16, 12, 0.92) 0%, rgba(6, 9, 7, 0.88) 100%);
      box-shadow: 0 24px 75px rgba(0, 0, 0, 0.55);
      padding: 28px 22px;
      margin-bottom: 18px;
      overflow: hidden;
      position: relative;
    }
    .hero::after {
      content: "";
      position: absolute;
      right: -140px;
      top: -140px;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(165, 207, 170, 0.16), transparent 65%);
      pointer-events: none;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 3.8vw, 42px);
      line-height: 1.05;
      letter-spacing: -0.02em;
    }
    .hero p {
      margin: 0;
      max-width: 800px;
      color: var(--muted);
      font-size: 15px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }
    .stat {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(7, 10, 8, 0.58);
      padding: 14px;
      backdrop-filter: blur(10px);
      transition: transform 0.15s ease, border-color 0.15s ease, background-color 0.15s ease;
    }
    .stat:hover {
      transform: translateY(-1px);
      border-color: rgba(165, 207, 170, 0.30);
      background: rgba(9, 14, 11, 0.66);
    }
    .stat .k { color: rgba(238, 247, 240, 0.92); font-size: 18px; font-weight: 750; letter-spacing: -0.01em; }
    .stat .v { color: rgba(238, 247, 240, 0.60); font-size: 12px; margin-top: 4px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 12px;
    }
    .card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(10, 16, 12, 0.62), rgba(6, 9, 7, 0.52));
      backdrop-filter: blur(12px);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.45);
      padding: 18px 18px 16px;
      min-height: 150px;
      transition: transform 0.15s ease, border-color 0.15s ease;
      position: relative;
      overflow: hidden;
    }
    .card:hover { transform: translateY(-1px); border-color: rgba(165, 207, 170, 0.28); }
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0;
      background: radial-gradient(700px 220px at 25% 0%, rgba(165, 207, 170, 0.10), transparent 60%);
      transition: opacity 0.20s ease;
      pointer-events: none;
    }
    .card:hover::before { opacity: 1; }
    .card h2 { margin: 0 0 10px; font-size: 16px; font-weight: 620; letter-spacing: 0.01em; }
    .card p.hint { margin: 0 0 10px; color: var(--muted); font-size: 12px; }
    .col-4 { grid-column: span 4; }
    .col-12 { grid-column: span 12; }
    label { display: block; margin: 10px 0 6px; color: rgba(238, 247, 240, 0.66); font-size: 12px; }
    input[type="text"], textarea {
      width: 100%;
      border: 1px solid rgba(165, 207, 170, 0.16);
      border-radius: 12px;
      background: rgba(6, 9, 7, 0.70);
      color: rgba(238, 247, 240, 0.92);
      padding: 10px 11px;
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    input[type="text"]:focus, textarea:focus {
      border-color: rgba(165, 207, 170, 0.72);
      box-shadow: 0 0 0 3px rgba(165, 207, 170, 0.14);
    }
    textarea { min-height: 130px; resize: vertical; }
    .row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-top: 14px; }
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 42px;
      padding: 0 16px;
      border-radius: 12px;
      border: 1px solid rgba(165, 207, 170, 0.22);
      background: rgba(8, 12, 10, 0.55);
      backdrop-filter: blur(10px);
      color: rgba(238, 247, 240, 0.92);
      font-size: 13px;
      font-weight: 650;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: transform 0.10s ease, border-color 0.15s ease, filter 0.15s ease;
    }
    button:hover { border-color: rgba(165, 207, 170, 0.42); filter: brightness(1.06); }
    button:active { transform: translateY(1px); }
    button:disabled { cursor: not-allowed; opacity: 0.54; }
    button.primary {
      border-color: rgba(165, 207, 170, 0.65);
      background: linear-gradient(180deg, rgba(95, 170, 112, 0.58), rgba(30, 88, 56, 0.66));
      box-shadow: 0 16px 55px rgba(165, 207, 170, 0.16);
    }
    ul { margin: 10px 0 0; padding: 0; list-style: none; }
    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 7px;
      border: 1px solid rgba(129, 154, 200, 0.19);
      border-radius: 10px;
      margin-bottom: 6px;
      padding: 8px 10px;
      background: rgba(6, 9, 7, 0.62);
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 12px;
      color: #d5e1f8;
      word-break: break-all;
    }
    code {
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      padding: 3px 6px;
      border-radius: 7px;
      border: 1px solid rgba(129, 154, 200, 0.23);
      background: rgba(5, 8, 6, 0.74);
      font-size: 12px;
      color: #d6e2ff;
    }
    .msg { margin-top: 10px; min-height: 19px; font-size: 12px; color: var(--muted); }
    .msg.ok { color: var(--success); }
    .msg.err { color: var(--danger); }
    @media (max-width: 920px) {
      .col-4 { grid-column: span 12; }
      .stats { grid-template-columns: 1fr; }
      .hero { padding: 24px 16px; }
    }
  </style>
</head>
<body>
  <div id="webgl" aria-hidden="true"><canvas id="bg"></canvas></div>
  <main class="container">
    <header class="nav">
      <div class="brand">
        <span class="brand-dot"></span>
        <span>Antagonist >.<</span>
      </div>
      <div class="nav-right">
        <span class="pill"><span class="pill-dot"></span> /cloud</span>
        <a class="btn ghost" href="/">Home</a>
      </div>
    </header>

    <section class="hero">
      <h1>Cloud Config Manager</h1>
      <p>On this site u can view all the cloud configs available for antagonist lua script.</p>
      <div class="stats">
        <div class="stat"><div class="k" id="statProfiles">-</div><div class="v">Stored profiles</div></div>
      </div>
    </section>

    <section class="grid">
      <article class="card col-4">
        <h2>Profiles</h2>
        <p class="hint">View all cloud profile keys currently saved.</p>
        <div class="row">
          <button type="button" class="primary" id="btnRefresh">Refresh list</button>
        </div>
        <ul id="list"></ul>
        <div class="msg" id="listMsg"></div>
      </article>

      <article class="card col-4">
        <h2>Download</h2>
        <p class="hint">Fetch one profile and save it as a JSON file.</p>
        <label for="dlName">Profile name</label>
        <input type="text" id="dlName" placeholder="myconfig - steamname" autocomplete="off" />
        <div class="row">
          <button type="button" class="primary" id="btnDownload">Download payload</button>
        </div>
        <div class="msg" id="dlMsg"></div>
      </article>

      <!-- upload removed -->
    </section>
  </main>

  <script>
    (function () {
      var c = document.getElementById("bg");
      if (!c) return;
      var dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      var ctx = c.getContext("2d", { alpha: true });
      if (!ctx) return;

      function resize() {
        var w = window.innerWidth, h = window.innerHeight;
        c.width = Math.floor(w * dpr);
        c.height = Math.floor(h * dpr);
        c.style.width = w + "px";
        c.style.height = h + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      resize();
      window.addEventListener("resize", resize, { passive: true });

      function lerp(a, b, t) { return a + (b - a) * t; }

      var prevTs = 0;
      var smoothT = 0;
      function draw(ts) {
        if (!prevTs) prevTs = ts;
        var dt = Math.min(0.05, Math.max(0.0, (ts - prevTs) / 1000));
        prevTs = ts;
        smoothT += dt;
        var t = smoothT;
        var w = window.innerWidth, h = window.innerHeight;
        ctx.clearRect(0, 0, w, h);

        var g1 = ctx.createRadialGradient(w * 0.72, h * 0.10, 0, w * 0.72, h * 0.10, Math.max(w, h) * 0.9);
        g1.addColorStop(0, "rgba(165,207,170,0.16)");
        g1.addColorStop(0.55, "rgba(165,207,170,0.04)");
        g1.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = g1;
        ctx.fillRect(0, 0, w, h);

        var g2 = ctx.createRadialGradient(w * 0.12, h * 0.15, 0, w * 0.12, h * 0.15, Math.max(w, h) * 0.8);
        g2.addColorStop(0, "rgba(61,195,207,0.10)");
        g2.addColorStop(0.6, "rgba(61,195,207,0.03)");
        g2.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = g2;
        ctx.fillRect(0, 0, w, h);

        ctx.globalCompositeOperation = "screen";
        ctx.lineWidth = 1.35;
        ctx.shadowColor = "rgba(165,207,170,0.25)";
        ctx.shadowBlur = 10;
        for (var i = 0; i < 9; i++) {
          var y0 = 120 + i * 70;
          var amp = 34 + i * 2;
          var spd = 0.35 + i * 0.03;
          var ph = t * spd + i * 0.65;
          var alpha = 0.18 - i * 0.010;
          var r = Math.floor(lerp(165, 61, i / 8));
          var g = Math.floor(lerp(207, 195, i / 8));
          var b = Math.floor(lerp(170, 207, i / 8));
          ctx.strokeStyle = "rgba(" + r + "," + g + "," + b + "," + Math.max(0.02, alpha) + ")";
          ctx.beginPath();
          var step = 10; // smaller step = smoother curves
          for (var x = -60; x <= w + 60; x += step) {
            var nx = x / w;
            var y = y0 + Math.sin(nx * 6.2 + ph) * amp + Math.sin(nx * 2.6 + ph * 0.7) * (amp * 0.35);
            if (x === -60) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();
        }
        ctx.shadowBlur = 0;
        ctx.globalCompositeOperation = "source-over";

        var vg = ctx.createRadialGradient(w * 0.5, h * 0.4, Math.min(w, h) * 0.1, w * 0.5, h * 0.4, Math.max(w, h) * 0.9);
        vg.addColorStop(0, "rgba(0,0,0,0)");
        vg.addColorStop(1, "rgba(0,0,0,0.65)");
        ctx.fillStyle = vg;
        ctx.fillRect(0, 0, w, h);

        requestAnimationFrame(draw);
      }
      requestAnimationFrame(draw);
    })();

    (function () {
      var apiBase = "";
      function el(id) { return document.getElementById(id); }

      function setMsg(node, text, ok) {
        node.textContent = text || "";
        node.className = "msg " + (ok ? "ok" : text ? "err" : "");
      }

      function renderList(items) {
        var ul = el("list");
        ul.innerHTML = "";
        items.forEach(function (it) {
          var n = it.name || it.key || "";
          if (!n) return;
          var li = document.createElement("li");
          li.textContent = n;
          ul.appendChild(li);
        });
        el("statProfiles").textContent = String(items.length);
      }

      el("btnRefresh").onclick = function () {
        var msg = el("listMsg");
        setMsg(msg, "Loading...", true);
        fetch(apiBase + "/api/configs")
          .then(function (r) {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.json();
          })
          .then(function (data) {
            var items = (data && data.items) || [];
            renderList(items);
            setMsg(msg, "Found " + items.length + " profile(s).", true);
          })
          .catch(function (e) {
            setMsg(msg, String(e));
          });
      };

      el("btnDownload").onclick = function () {
        var name = (el("dlName").value || "").trim();
        var msg = el("dlMsg");
        if (!name) {
          setMsg(msg, "Enter a profile name.");
          return;
        }
        setMsg(msg, "Downloading...", true);
        fetch(apiBase + "/api/configs?name=" + encodeURIComponent(name))
          .then(function (r) {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.json();
          })
          .then(function (data) {
            if (!data || !data.payload) throw new Error("No payload in response");
            var blob = JSON.stringify(data, null, 2);
            var a = document.createElement("a");
            a.href = URL.createObjectURL(new Blob([blob], { type: "application/json" }));
            a.download = name + ".json";
            a.click();
            URL.revokeObjectURL(a.href);
            setMsg(msg, "Saved " + name + ".json", true);
          })
          .catch(function (e) {
            setMsg(msg, String(e));
          });
      };

      // upload removed

      el("btnRefresh").click();
    })();
  </script>
</body>
</html>
